<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bebek Hub - Pesan Online</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap");
      body {
        font-family: "Poppins", sans-serif;
        background: #0f0f0f;
        color: #fff;
        margin: 0;
        padding-bottom: 50px;
      }

      /* Overlay Tutup Toko */
      #tutup {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.98);
        z-index: 10000;
        justify-content: center;
        align-items: center;
        text-align: center;
        flex-direction: column;
      }
      #tutup h1 {
        color: #d4af37;
        font-size: 3rem;
        margin: 0;
      }

      .header {
        padding: 50px 20px;
        background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)),
          url("https://images.unsplash.com/photo-1580476262798-bddd9f4b7369?auto=format&fit=crop&w=1000&q=80");
        background-size: cover;
        background-position: center;
        border-bottom: 3px solid #d4af37;
        text-align: center;
      }
      .header h1 {
        color: #d4af37;
        font-size: 2.8rem;
        margin: 0;
        text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
      }

      .container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 25px;
        padding: 30px;
        max-width: 1200px;
        margin: auto;
      }

      .card {
        background: #1a1a1a;
        border-radius: 20px;
        overflow: hidden;
        border: 1px solid #333;
        transition: 0.4s;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
      }
      .card:hover {
        border-color: #d4af37;
        transform: translateY(-10px);
      }
      .card img {
        width: 100%;
        height: 220px;
        object-fit: cover;
      }
      .card-info {
        padding: 20px;
        text-align: center;
      }
      .card-info h3 {
        margin: 10px 0;
        font-size: 1.5rem;
      }
      .card-info .price {
        color: #d4af37;
        font-weight: 600;
        font-size: 1.3rem;
        margin-bottom: 20px;
      }

      .btn-order {
        background: #d4af37;
        color: #000;
        border: none;
        padding: 12px;
        width: 100%;
        border-radius: 30px;
        font-weight: 700;
        cursor: pointer;
        font-size: 1rem;
        transition: 0.3s;
      }
      .btn-order:hover {
        background: #fff;
      }

      @media (max-width: 600px) {
        .header h1 {
          font-size: 2rem;
        }
        .container {
          padding: 15px;
        }
      }
    </style>
  </head>
  <body>
    <div id="tutup">
      <h1>TOKO TUTUP</h1>
      <p>Maaf, kami sedang istirahat. Kembali lagi nanti!</p>
    </div>

    <div class="header">
      <h1>Bebek Hub 🦆</h1>
      <p>Rasa Bintang Lima, Harga Kaki Lima</p>
    </div>

    <div class="container" id="menu-box"></div>

    <script>
      const API = "https://69c2ddb07518bf8facbfb548.mockapi.io/pesanan";

      const daftarMenu = [
        {
          n: "Bebek Goreng Madura",
          h: "25.000",
          g: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTVkjlO476q1yS-kRuCIQYSyFh7eaoSqgRHmbvliV6Krcu-oYGwaRHeRS7Z8EFNLPbkioQu_jvXshJ4cv7M17-VBlXF0bk-7-I7epgmNTDwUw&s=10",
        },
        {
          n: "Ayam Bakar Madu",
          h: "20.000",
          g: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR0Svopc9Z68DoSeKhxH6xkm8Fzn162fZ9bGw&s",
        },
        {
          n: "Soto Bebek Spesial",
          h: "15.000",
          g: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTKtaP0gmXS6LA4YWGlHHGhyeuByQxZw4XmxNc2iTm4-EKCdEwOpDJ-ezOgIS7embgOSu3AGn4yvcEvjFv7RFUJiVFsUp8GPkLgoChrfPRImA&s=10",
        },
      ];

      const box = document.getElementById("menu-box");
      daftarMenu.forEach((m) => {
        box.innerHTML += `
                <div class="card">
                    <img src="${m.g}">
                    <div class="card-info">
                        <h3>${m.n}</h3>
                        <p class="price">Rp ${m.h}</p>
                        <button class="btn-order" onclick="pesan('${m.n}')">PESAN SEKARANG</button>
                    </div>
                </div>`;
      });

      async function pesan(m) {
        const nama = prompt("Nama Anda:");
        if (!nama) return;
        const porsi = prompt("Berapa Porsi?", "1");
        const catatan = prompt("Catatan (Misal: Paha, Pedas):", "-");

        try {
          await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              nama,
              menu: m,
              porsi,
              catatan,
              waktu: new Date().toLocaleTimeString(),
            }),
          });
          alert("Pesanan Terkirim! Mohon Tunggu di Dashboard Admin.");
        } catch (e) {
          alert("Gagal koneksi!");
        }
      }

      // Sinkronisasi Tutup Toko
      setInterval(async () => {
        try {
          const res = await fetch(API + "/1");
          const d = await res.json();
          document.getElementById("tutup").style.display =
            d.status_toko === "tutup" ? "flex" : "none";
        } catch (e) {}
      }, 3000);
    </script>
  </body>
</html>
